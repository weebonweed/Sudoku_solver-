<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku AI Solver</title>
    <!-- Modern stylish font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Sudoku AI Solver</h1>
        </header>

        <main>
            <div id="sudoku-container">
                <div id="sudoku-grid">
                    <!-- 81 inputs will be generated by JS -->
                </div>
            </div>

            <aside class="control-panel">
                <div class="controls-group">
                    <button id="btn-solve" class="btn primary ui-interactive">Solve Puzzle</button>
                    <button id="btn-validate" class="btn secondary ui-interactive">Validate Puzzle</button>
                    <button id="btn-generate" class="btn secondary ui-interactive">Generate Puzzle</button>
                </div>

                <div class="controls-group">
                    <button id="btn-reset" class="btn danger ui-interactive">Reset Board</button>
                    <button id="btn-clear" class="btn danger ui-interactive">Clear Board</button>
                </div>

                <div class="controls-group">
                    <button id="btn-save" class="btn info ui-interactive">Save Progress</button>
                    <button id="btn-load" class="btn info ui-interactive">Load Progress</button>
                </div>

                <div class="controls-group">
                    <input type="file" id="image-upload" accept="image/png, image/jpeg, image/jpg"
                        style="display: none;">
                    <button id="btn-upload" class="btn primary ui-interactive"
                        onclick="document.getElementById('image-upload').click()">Upload Sudoku Image</button>
                </div>

                <div class="controls-group difficulty-selector">
                    <label for="select-difficulty">Difficulty:</label>
                    <select id="select-difficulty" class="ui-interactive">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
            </aside>
        </main>

        <div id="notification-area"></div>
    </div>
    <!-- Image Preview Modal -->
    <div id="image-preview-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Confirm Sudoku Image</h2>
            <div class="preview-container">
                <img id="preview-image" src="" alt="Sudoku Preview">
            </div>
            <div class="modal-actions">
                <button id="btn-cancel-upload" class="btn danger">Cancel</button>
                <button id="btn-confirm-upload" class="btn success">Extract Puzzle</button>
            </div>
        </div>
    </div>

    <!-- Tesseract OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
