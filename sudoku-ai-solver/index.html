<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku AI - Vision & Solver</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>SUDOKU <span class="accent">AI</span></h1>
        </header>

        <main>
            <div id="sudoku-container">
                <div id="sudoku-grid"></div>
            </div>

            <div class="game-controls-panel">
                <div class="timer-section">
                    <div id="timer-display" class="timer">00:00</div>
                    <div class="action-row">
                        <button id="btn-start-timer" class="btn primary">
                            <i class="fas fa-play"></i> Start
                        </button>
                        <button id="btn-pause-timer" class="btn secondary" disabled>
                            <i class="fas fa-pause"></i> Pause
                        </button>
                    </div>
                    <select id="difficulty-level" class="btn info">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>

                <div class="actions-section">
                    <div class="side-controls">
                        <button id="btn-generate" class="btn secondary">
                            <i class="fas fa-plus"></i> New Game
                        </button>
                        <button id="btn-solve" class="btn primary">
                            <i class="fas fa-brain"></i> AI Solve
                        </button>
                    </div>
                    
                    <div class="side-controls">
                        <button id="btn-validate" class="btn info">
                            <i class="fas fa-check-circle"></i> Validate
                        </button>
                        <label for="image-upload" class="btn info" style="display: flex; align-items: center; justify-content: center; margin: 0; cursor: pointer;">
                            <i class="fas fa-camera" style="margin-right: 8px;"></i> Scan Puzzle
                            <input type="file" id="image-upload" accept="image/*" hidden>
                        </label>
                    </div>

                    <div class="side-controls">
                        <button id="btn-save" class="btn secondary">
                            <i class="fas fa-save"></i> Save
                        </button>
                        <button id="btn-load" class="btn secondary">
                            <i class="fas fa-folder-open"></i> Load
                        </button>
                    </div>

                    <div class="side-controls single-btn-row">
                        <button id="btn-clear" class="btn danger" onclick="location.reload()">
                            <i class="fas fa-undo"></i> Reset Board
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="notification-area"></div>

    <div id="image-preview-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Confirm Scan</h3>
            <div class="preview-container">
                <img id="preview-image" src="" alt="Preview">
            </div>
            <div class="modal-actions">
                <button id="btn-confirm-upload" class="btn primary">Analyze Grid</button>
                <button onclick="document.getElementById('image-preview-modal').classList.add('hidden')" class="btn secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
